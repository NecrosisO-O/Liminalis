services:
  postgres:
    image: postgres:16-alpine
    container_name: liminalis-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: liminalis
    ports:
      - "5432:5432"
    volumes:
      - liminalis-postgres-data:/var/lib/postgresql/data

volumes:
  liminalis-postgres-data:
